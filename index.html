<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clean Mailing List</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:20px;max-width:980px}
    header{display:flex;align-items:center;gap:16px}
    .controls{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
    table{border-collapse:collapse;width:100%;margin-top:12px}
    th,td{border:1px solid #ddd;padding:6px;font-size:13px}
    pre{background:#f6f8fa;padding:8px;border-radius:6px}
    button:disabled{opacity:.5}
  </style>
  <!-- PapaParse for robust CSV parsing -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header>
    <h1>Mailing List Cleaner</h1>
  </header>

  <p>Upload a CSV; the cleaner runs in your browser and produces a cleaned CSV for download.</p>

  <div class="controls">
    <input id="fileInput" type="file" accept=".csv,text/csv" />
    <button id="processBtn" disabled>Process upload</button>
    <button id="downloadBtn" disabled>Download cleaned CSV</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="stats" style="margin-top:12px"></div>

  <div id="preview"></div>

  <script>
    // Configuration - edit as needed
    const ADDRESS1_REMOVE_KEYWORDS = ['PARKING', 'LOADING DOCK', 'DO NOT DELIVER', 'ATTN: DO NOT DELIVER']; // case-insensitive substrings
    const ADDRESS1_REMOVE_STREETS = ['ALLEY', 'CTY RD', 'COUNTY ROAD']; // substrings to drop rows
    const NAME_TAG_REMOVE = ['EMPLOYEE', 'DOOR TAG']; // names that should be removed entirely (exact or contains)
    const NAME_TAG_STRIP = ['(O-C)']; // substrings to strip from Customer Name (row kept)
    const PO_BOX_PATTERNS = [/PO BOX/i, /P\.?O\.? BOX/i];

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const stats = document.getElementById('stats');
    const preview = document.getElementById('preview');

    let parsedRows = [];
    let headers = [];
    let cleanedRows = [];

    fileInput.addEventListener('change', () => {
      processBtn.disabled = !fileInput.files.length;
      downloadBtn.disabled = true;
      stats.textContent = '';
      preview.innerHTML = '';
    });

    processBtn.addEventListener('click', () => {
      const file = fileInput.files[0];
      if (!file) return;
      stats.textContent = 'Parsing CSV...';
      Papa.parse(file, {
        header: true,
        skipEmptyLines: false,
        dynamicTyping: false,
        complete: result => {
          headers = result.meta.fields || [];
          parsedRows = result.data || [];
          stats.textContent = `Parsed ${parsedRows.length} rows (headers: ${headers.join(', ') || '[none]'})`;
          cleanedRows = cleanRows(parsedRows, headers);
          showPreview(cleanedRows, headers);
          downloadBtn.disabled = false;
          stats.innerHTML = `${stats.innerHTML}<br>Cleaned rows: ${cleanedRows.length}`;
        },
        error: err => {
          stats.textContent = 'Error parsing CSV: ' + err.message;
        }
      });
    });

    resetBtn.addEventListener('click', () => {
      fileInput.value = '';
      parsedRows = [];
      cleanedRows = [];
      headers = [];
      processBtn.disabled = true;
      downloadBtn.disabled = true;
      stats.textContent = '';
      preview.innerHTML = '';
    });

    downloadBtn.addEventListener('click', () => {
      if (!cleanedRows.length) return;
      const csv = Papa.unparse({fields: headers, data: cleanedRows});
      const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mailing_list_cleaned.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    // Cleaning logic
    function cleanRows(rows, hdrs){
      // Normalize header names we expect; fallback to common variants
      const field = f => {
        const map = hdrs.reduce((m,k)=>{m[k.toLowerCase().trim()]=k; return m;}, {});
        const keys = Object.keys(map);
        const lookup = name => map[name.toLowerCase()] || map[name.toLowerCase().replace(/\s+/g,' ')] || null;
        return lookup(f.toLowerCase()) || lookup(f) || f;
      };
      const FN = {
        num: field('Customer Number'),
        name: field('Customer Name'),
        a1: field('Address 1'),
        a2: field('Address 2'),
        email: field('Email Address')
      };

      // 1) remove blank rows (all fields empty)
      let filtered = rows.filter(r => {
        return Object.values(r).some(v => (v !== null && v !== undefined && String(v).trim() !== ''));
      });

      // 2) remove full duplicate rows (exact same content)
      const seenFull = new Set();
      filtered = filtered.filter(r => {
        const key = JSON.stringify(r);
        if (seenFull.has(key)) return false;
        seenFull.add(key);
        return true;
      });

      // 3) filter by Address 1 keywords / streets
      filtered = filtered.filter(r => {
        const a1 = String(r[FN.a1] || '').toUpperCase();
        if (!a1) return true;
        for (const kw of ADDRESS1_REMOVE_KEYWORDS) {
          if (a1.includes(kw.toUpperCase())) return false;
        }
        for (const st of ADDRESS1_REMOVE_STREETS) {
          if (a1.includes(st.toUpperCase())) return false;
        }
        return true;
      });

      // 4) remove rows where Customer Name matches NAME_TAG_REMOVE
      filtered = filtered.filter(r => {
        const nm = String(r[FN.name] || '').toUpperCase();
        if (!nm) return true;
        for (const t of NAME_TAG_REMOVE) {
          if (nm.includes(t.toUpperCase())) return false;
        }
        return true;
      });

      // 5) strip NAME_TAG_STRIP substrings from Customer Name
      filtered.forEach(r => {
        let nm = String(r[FN.name] || '');
        for (const s of NAME_TAG_STRIP) {
          nm = nm.split(s).join('').trim();
        }
        r[FN.name] = nm;
      });

      // 6) Move Address2 -> Address1 if Address1 empty
      filtered.forEach(r => {
        const a1 = String(r[FN.a1] || '').trim();
        const a2 = String(r[FN.a2] || '').trim();
        if ((!a1 || a1 === '') && a2) {
          r[FN.a1] = a2;
          r[FN.a2] = '';
        }
      });

      // 7) If Address1 contains PO BOX and Address2 present, clear Address2
      filtered.forEach(r => {
        const a1 = String(r[FN.a1] || '');
        const a2 = String(r[FN.a2] || '');
        if (a2) {
          for (const pat of PO_BOX_PATTERNS) {
            if (pat.test(a1)) {
              r[FN.a2] = '';
              break;
            }
          }
        }
      });

      // 8) Deduplicate by Customer Number, prefer row with Email Address
      const groups = new Map();
      filtered.forEach(r => {
        const id = String(r[FN.num] || '').trim();
        if (!id) {
          // keep rows without Customer Number as-is, use unique key
          const tempKey = `__noid__${Math.random().toString(36).slice(2,9)}`;
          groups.set(tempKey, r);
          return;
        }
        if (!groups.has(id)) groups.set(id, r);
        else {
          const existing = groups.get(id);
          const existingHasEmail = String(existing[FN.email] || '').trim() !== '';
          const rHasEmail = String(r[FN.email] || '').trim() !== '';
          if (!existingHasEmail && rHasEmail) groups.set(id, r); // prefer email
        }
      });

      // Build final array in original order as much as possible
      const final = [];
      const used = new Set();
      filtered.forEach(r => {
        const id = String(r[FN.num] || '').trim();
        if (!id) {
          // unique key rows were inserted in groups with random keys; include them
          const key = [...groups.entries()].find(([k,v]) => v === r)?.[0];
          if (key && !used.has(key)) { final.push(r); used.add(key); }
          return;
        }
        const groupRow = groups.get(id);
        if (groupRow && !used.has(id)) {
          final.push(groupRow);
          used.add(id);
        }
      });

      // If headers had extra fields not in rows, ensure output keys match original header order
      return final;
    }

    function showPreview(rows, hdrs){
      preview.innerHTML = '';
      if (!rows.length){
        preview.innerHTML = '<p>No rows after cleaning.</p>';
        return;
      }
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const trh = document.createElement('tr');
      // Use headers from parsed file if available, else infer from first row
      const cols = hdrs.length ? hdrs : Object.keys(rows[0]);
      cols.forEach(c => {
        const th = document.createElement('th'); th.textContent = c; trh.appendChild(th);
      });
      thead.appendChild(trh);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      const max = Math.min(rows.length, 100);
      for (let i=0;i<max;i++){
        const r = rows[i];
        const tr = document.createElement('tr');
        cols.forEach(c => {
          const td = document.createElement('td');
          td.textContent = r[c] !== undefined ? r[c] : '';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      preview.appendChild(table);
      if (rows.length > 100){
        const p = document.createElement('p');
        p.textContent = `Showing first 100 of ${rows.length} rows.`;
        preview.appendChild(p);
      }
    }
  </script>
</body>
</html>
