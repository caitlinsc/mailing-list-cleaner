<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mailing List Cleaner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 40px;
    }
    h1 {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }
    .section {
      margin-bottom: 32px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 12px;
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    input[type="file"] {
      font-size: 14px;
      padding: 8px 0;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #ddd;
      background: white;
      color: #333;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover:not(:disabled) {
      background: #f0f0f0;
      border-color: #999;
    }
    button.primary {
      background: #0969da;
      color: white;
      border-color: #0969da;
    }
    button.primary:hover:not(:disabled) {
      background: #0860ca;
      border-color: #0860ca;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .stats {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      padding: 12px 16px;
      font-size: 13px;
      color: #333;
      line-height: 1.6;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 16px;
    }
    th {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: #333;
    }
    td {
      border: 1px solid #d0d7de;
      padding: 8px 12px;
      color: #333;
    }
    tr:nth-child(even) {
      background: #fafbfc;
    }
    tr:hover {
      background: #f0f0f0;
    }
    .preview-info {
      font-size: 13px;
      color: #666;
      margin-top: 12px;
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
  </style>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Mailing List Cleaner</h1>
    <p class="subtitle">Upload a CSV to remove duplicates, invalid addresses, and apply cleaning rules.</p>

    <div class="section">
      <div class="section-title">Upload</div>
      <div class="controls">
        <input id="fileInput" type="file" accept=".csv,text/csv" />
        <button id="processBtn" class="primary" disabled>Process</button>
        <button id="downloadBtn" disabled>Download CSV</button>
        <button id="resetBtn">Reset</button>
      </div>
    </div>

    <div id="statsSection" class="section" style="display:none;">
      <div class="section-title">Summary</div>
      <div id="stats" class="stats"></div>
    </div>

    <div id="previewSection" class="section" style="display:none;">
      <div class="section-title">Preview</div>
      <div id="preview"></div>
    </div>
  </div>

  <script>
    const ADDRESS1_REMOVE_KEYWORDS = ['PARKING', 'LOADING DOCK', 'DO NOT DELIVER', 'ATTN: DO NOT DELIVER'];
    const ADDRESS1_REMOVE_STREETS = ['ALLEY', 'CTY RD', 'COUNTY ROAD'];
    const NAME_TAG_REMOVE = ['EMPLOYEE', 'DOOR TAG'];
    const NAME_TAG_STRIP = ['(O-C)'];
    const PO_BOX_PATTERNS = [/PO BOX/i, /P\.?O\.? BOX/i];

    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');
    const stats = document.getElementById('stats');
    const preview = document.getElementById('preview');
    const statsSection = document.getElementById('statsSection');
    const previewSection = document.getElementById('previewSection');

    let parsedRows = [];
    let headers = [];
    let cleanedRows = [];

    fileInput.addEventListener('change', () => {
      processBtn.disabled = !fileInput.files.length;
      downloadBtn.disabled = true;
      statsSection.style.display = 'none';
      previewSection.style.display = 'none';
    });

    processBtn.addEventListener('click', () => {
      const file = fileInput.files[0];
      if (!file) return;
      stats.innerHTML = '<p>Parsing CSV...</p>';
      statsSection.style.display = 'block';
      Papa.parse(file, {
        header: true,
        skipEmptyLines: false,
        dynamicTyping: false,
        complete: result => {
          headers = result.meta.fields || [];
          parsedRows = result.data || [];
          cleanedRows = cleanRows(parsedRows, headers);
          const removed = parsedRows.length - cleanedRows.length;
          stats.innerHTML = `
            <strong>Parsed:</strong> ${parsedRows.length} rows<br>
            <strong>Cleaned:</strong> ${cleanedRows.length} rows<br>
            <strong>Removed:</strong> ${removed} rows
          `;
          showPreview(cleanedRows, headers);
          downloadBtn.disabled = false;
        },
        error: err => {
          stats.innerHTML = '<p style="color:red;">Error parsing CSV: ' + err.message + '</p>';
        }
      });
    });

    resetBtn.addEventListener('click', () => {
      fileInput.value = '';
      parsedRows = [];
      cleanedRows = [];
      headers = [];
      processBtn.disabled = true;
      downloadBtn.disabled = true;
      statsSection.style.display = 'none';
      previewSection.style.display = 'none';
    });

    downloadBtn.addEventListener('click', () => {
      if (!cleanedRows.length) return;
      const csv = Papa.unparse({fields: headers, data: cleanedRows});
      const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mailing_list_cleaned.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    function cleanRows(rows, hdrs){
      const field = f => {
        const map = hdrs.reduce((m,k)=>{m[k.toLowerCase().trim()]=k; return m;}, {});
        const lookup = name => map[name.toLowerCase()] || map[name.toLowerCase().replace(/\s+/g,' ')] || null;
        return lookup(f.toLowerCase()) || lookup(f) || f;
      };
      const FN = {
        num: field('Customer Number'),
        name: field('Customer Name'),
        a1: field('Address 1'),
        a2: field('Address 2'),
        email: field('Email Address')
      };

      let filtered = rows.filter(r => Object.values(r).some(v => (v !== null && v !== undefined && String(v).trim() !== '')));
      const seenFull = new Set();
      filtered = filtered.filter(r => {
        const key = JSON.stringify(r);
        if (seenFull.has(key)) return false;
        seenFull.add(key);
        return true;
      });

      filtered = filtered.filter(r => {
        const a1 = String(r[FN.a1] || '').toUpperCase();
        if (!a1) return true;
        for (const kw of ADDRESS1_REMOVE_KEYWORDS) {
          if (a1.includes(kw.toUpperCase())) return false;
        }
        for (const st of ADDRESS1_REMOVE_STREETS) {
          if (a1.includes(st.toUpperCase())) return false;
        }
        return true;
      });

      filtered = filtered.filter(r => {
        const nm = String(r[FN.name] || '').toUpperCase();
        if (!nm) return true;
        for (const t of NAME_TAG_REMOVE) {
          if (nm.includes(t.toUpperCase())) return false;
        }
        return true;
      });

      filtered.forEach(r => {
        let nm = String(r[FN.name] || '');
        for (const s of NAME_TAG_STRIP) {
          nm = nm.split(s).join('').trim();
        }
        r[FN.name] = nm;
      });

      filtered.forEach(r => {
        const a1 = String(r[FN.a1] || '').trim();
        const a2 = String(r[FN.a2] || '').trim();
        if ((!a1 || a1 === '') && a2) {
          r[FN.a1] = a2;
          r[FN.a2] = '';
        }
      });

      filtered.forEach(r => {
        const a1 = String(r[FN.a1] || '');
        const a2 = String(r[FN.a2] || '');
        if (a2) {
          for (const pat of PO_BOX_PATTERNS) {
            if (pat.test(a1)) {
              r[FN.a2] = '';
              break;
            }
          }
        }
      });

      const groups = new Map();
      filtered.forEach(r => {
        const id = String(r[FN.num] || '').trim();
        if (!id) {
          const tempKey = `__noid__${Math.random().toString(36).slice(2,9)}`;
          groups.set(tempKey, r);
          return;
        }
        if (!groups.has(id)) groups.set(id, r);
        else {
          const existing = groups.get(id);
          const existingHasEmail = String(existing[FN.email] || '').trim() !== '';
          const rHasEmail = String(r[FN.email] || '').trim() !== '';
          if (!existingHasEmail && rHasEmail) groups.set(id, r);
        }
      });

      const final = [];
      const used = new Set();
      filtered.forEach(r => {
        const id = String(r[FN.num] || '').trim();
        if (!id) {
          const key = [...groups.entries()].find(([k,v]) => v === r)?.[0];
          if (key && !used.has(key)) { final.push(r); used.add(key); }
          return;
        }
        const groupRow = groups.get(id);
        if (groupRow && !used.has(id)) {
          final.push(groupRow);
          used.add(id);
        }
      });

      return final;
    }

    function showPreview(rows, hdrs){
      preview.innerHTML = '';
      previewSection.style.display = 'block';
      if (!rows.length){
        preview.innerHTML = '<p class="empty-state">No rows after cleaning.</p>';
        return;
      }
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const trh = document.createElement('tr');
      const cols = hdrs.length ? hdrs : Object.keys(rows[0]);
      cols.forEach(c => {
        const th = document.createElement('th');
        th.textContent = c;
        trh.appendChild(th);
      });
      thead.appendChild(trh);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      const max = Math.min(rows.length, 100);
      for (let i=0;i<max;i++){
        const r = rows[i];
        const tr = document.createElement('tr');
        cols.forEach(c => {
          const td = document.createElement('td');
          td.textContent = r[c] !== undefined ? r[c] : '';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      preview.appendChild(table);
      if (rows.length > 100){
        const p = document.createElement('p');
        p.className = 'preview-info';
        p.textContent = `Showing first 100 of ${rows.length} rows.`;
        preview.appendChild(p);
      }
    }
  </script>
</body>
</html>
